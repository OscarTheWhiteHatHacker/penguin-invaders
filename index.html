<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguin Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    color: #ffaa00;
    font-size: 36px;
    text-shadow: 0 0 20px rgba(255,170,0,0.5), 0 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  canvas {
    border: 3px solid #334;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,100,255,0.3), inset 0 0 30px rgba(0,0,0,0.3);
    display: block;
  }
  .instructions {
    color: #8899aa;
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: 2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    align-items: center;
  }
  .btn {
    background: #1a1a4e;
    color: #8899cc;
    border: 1px solid #334;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:hover {
    background: #2a2a6e;
    color: #aabbee;
    border-color: #556;
    box-shadow: 0 0 12px rgba(0,100,255,0.3);
  }
  .btn:active {
    transform: scale(0.96);
  }
  .btn.active {
    background: #ffaa00;
    color: #0a0a2e;
    border-color: #ffaa00;
    box-shadow: 0 0 15px rgba(255,170,0,0.4);
  }
  .btn.fullscreen-btn {
    background: transparent;
    border-color: #445;
    font-size: 16px;
    padding: 6px 10px;
  }
  .btn.fullscreen-btn:hover {
    background: #1a1a4e;
  }

  /* ─── Fullscreen ──────────────────────────────── */
  .game-container:fullscreen {
    width: 100vw; height: 100vh;
    background: #080820;
    justify-content: center;
    padding: 0;
  }
  .game-container:fullscreen canvas {
    width: 100vw !important;
    height: 100vh !important;
    display: block;
  }
  .game-container:fullscreen .controls,
  .game-container:fullscreen .instructions,
  .game-container:fullscreen h1 {
    display: none;
  }
</style>
</head>
<body>
<div class="game-container">
  <h1>🐧 Penguin Invaders</h1>
  <canvas id="gameCanvas" width="800" height="600" tabindex="0"></canvas>
  <p class="instructions">⟵/→ or A/D Move &nbsp;|&nbsp; Space Shoot &nbsp;|&nbsp; P Pause &nbsp;|&nbsp; 1 Fullscreen &nbsp;|&nbsp; M Sound</p>
  <div class="controls">
    <button class="btn" data-diff="easy" id="diffEasy">Easy</button>
    <button class="btn active" data-diff="medium" id="diffMedium">Medium</button>
    <button class="btn" data-diff="hard" id="diffHard">Hard</button>
    <button class="btn fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    <button class="btn" id="muteBtn" title="Toggle sound (M key)">🔊</button>
  </div>
</div>
<script>
"use strict";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
let renderScale = 1;

// ─── Key State ───────────────────────────────────────────────
const keys = { left: false, right: false, space: false };
let spaceJustPressed = false; // edge-triggered: true only on the frame space goes down

function handleKey(e, pressed) {
  const k = e.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') { keys.left = pressed; e.preventDefault(); }
  if (k === 'ArrowRight' || k === 'd' || k === 'D') { keys.right = pressed; e.preventDefault(); }
  if (k === ' ') {
    if (pressed && !keys.space) spaceJustPressed = true; // rising edge only
    keys.space = pressed;
    e.preventDefault();
  }
  if (k === ' ' && pressed && game.state === GAME_STATES.MENU) Audio.startMusic();
  if (k === ' ' && pressed && game.state === GAME_STATES.GAME_OVER) Audio.startMusic();
}

document.addEventListener('keydown', (e) => handleKey(e, true), { passive: false });
document.addEventListener('keyup', (e) => handleKey(e, false), { passive: false });

// ─── Difficulty Configs ─────────────────────────────────────
const DIFFICULTIES = {
  easy:   { label:'Easy', lives:5, bearBaseSpeed:50, enemyFireRate:0.0015, waveSpeedBonus:10, bearHPBonus:0, shootCooldown:0.25, playerSpeed:350, powerUpChance:0.18 },
  medium: { label:'Medium', lives:3, bearBaseSpeed:80, enemyFireRate:0.003, waveSpeedBonus:15, bearHPBonus:0, shootCooldown:0.3, playerSpeed:300, powerUpChance:0.14 },
  hard:   { label:'Hard', lives:2, bearBaseSpeed:110, enemyFireRate:0.006, waveSpeedBonus:20, bearHPBonus:1, shootCooldown:0.35, playerSpeed:260, powerUpChance:0.10 },
};

let currentDifficulty = 'medium';

// ─── Game Constants ─────────────────────────────────────────
const BULLET_SPEED = 500;
const ENEMY_BULLET_SPEED = 200;
const INVULN_TIME = 1.5;
const DROP_DISTANCE = 12;
const GAME_STATES = { MENU:'MENU', PLAYING:'PLAYING', GAME_OVER:'GAME_OVER', PAUSED:'PAUSED' };

const BEAR_SIZES = {
  huge:  { w:55, h:50, hp:3, points:30, colorOffset:10 },
  big:   { w:44, h:40, hp:2, points:20, colorOffset:5 },
  medium:{ w:35, h:32, hp:1, points:10, colorOffset:0 }
};

const POWERUP_TYPES = {
  spread: { color:'#ff44ff', symbol:'⍟', label:'SPREAD', duration:6 },
  rapid:  { color:'#44ff44', symbol:'⚡', label:'RAPID', duration:5 },
  shield: { color:'#44aaff', symbol:'◈', label:'SHIELD', duration:0, instant:true },
  life:   { color:'#ff4444', symbol:'♥', label:'1UP', duration:0, instant:true },
  nuke:   { color:'#ffaa00', symbol:'☢', label:'NUKE', duration:0, instant:true },
};
const POWERUP_KEYS = Object.keys(POWERUP_TYPES);
const POWERUP_FALL_SPEED = 60;
const POWERUP_SIZE = 18;

function loadHighScore() {
  try { return parseInt(localStorage.getItem('pi_highScore')) || 0; } catch(e) { return 0; }
}
function saveHighScore(score) {
  try { localStorage.setItem('pi_highScore', score); } catch(e) {}
}

// ─── Audio Manager (Web Audio API) ──────────────────────────
const Audio = {
  _ctx: null, _sfxGain: null, _musicGain: null, _muted: false,
  _musicOn: false, _musicEl: null, _musicSrc: null, _musicReady: false,
  _musicUrl: 'assets/music/new_background_music.mp3',

  init() {
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this._ctx.createGain();
    master.gain.value = 0.35;
    master.connect(this._ctx.destination);
    this._sfxGain = this._ctx.createGain();
    this._sfxGain.gain.value = 0.5;
    this._sfxGain.connect(master);
    this._musicGain = this._ctx.createGain();
    this._musicGain.gain.value = 0.25;
    this._musicGain.connect(master);
  },
  _ensure() {
    if (!this._ctx) this.init();
    if (this._ctx.state === 'suspended') this._ctx.resume();
  },

  shoot() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='square'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(400,t+0.08);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.1);
  },
  enemyHit() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(150,t+0.12);
    g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.15);
  },
  enemyKill() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(80,t+0.3);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.35);
  },
  playerHit() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2);
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.25);
  },
  gameOver() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    [400,350,300,200,150].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.2,t+i*0.12); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.15);
      o.connect(g); g.connect(this._sfxGain); o.start(t+i*0.12); o.stop(t+i*0.12+0.15);
    });
  },
  waveComplete() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    [262,330,392,523].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.25,t+i*0.1); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.2);
      o.connect(g); g.connect(this._sfxGain); o.start(t+i*0.1); o.stop(t+i*0.1+0.2);
    });
  },
  powerUp() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    [523,659,784].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.2,t+i*0.08); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.12);
      o.connect(g); g.connect(this._sfxGain); o.start(t+i*0.08); o.stop(t+i*0.08+0.12);
    });
  },
  nuke() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(20,t+0.8);
    g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.9);
  },
  bossAppear() {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    [110,220,330,440,550].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.2,t+i*0.15); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.3);
      o.connect(g); g.connect(this._sfxGain); o.start(t+i*0.15); o.stop(t+i*0.15+0.3);
    });
  },
  combo(x) {
    if (this._muted) return; this._ensure();
    const c=this._ctx, t=c.currentTime;
    const f = 400 + x * 100;
    const o=c.createOscillator(), g=c.createGain();
    o.type='square'; o.frequency.value=f;
    g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.connect(g); g.connect(this._sfxGain); o.start(t); o.stop(t+0.08);
  },

  // --- Background Music (MP3 file, routed through Web Audio gain) ---
  _loadMusic() {
    if (this._musicEl) return;
    // NB: this object shadows window.Audio, so use createElement.
    const el = document.createElement('audio');
    el.src = this._musicUrl;
    el.loop = true;             // seamless loop
    el.preload = 'auto';
    el.crossOrigin = 'anonymous';
    this._musicEl = el;
    try {
      const src = this._ctx.createMediaElementSource(el);
      src.connect(this._musicGain);
      this._musicSrc = src;
    } catch (e) {
      // Fallback (e.g. createMediaElementSource unavailable): play element directly.
      el.volume = 0.65;
    }
    el.addEventListener('canplaythrough', () => { this._musicReady = true; }, { once: true });
    el.addEventListener('error', (e) => { console.warn('Music load error:', el.src, e); });
    el.load();
  },

  startMusic() {
    if (this._muted) return;
    this.stopMusic();
    this._ensure();
    this._loadMusic();
    this._musicOn = true;
    const el = this._musicEl;
    el.currentTime = 0;
    const p = el.play();
    if (p && p.catch) p.catch(err => console.warn('Music play failed:', err));
  },
  stopMusic() {
    this._musicOn = false;
    if (this._musicEl) {
      try { this._musicEl.pause(); } catch (e) {}
    }
  },
  toggleMute() {
    this._muted = !this._muted;
    if (this._muted) this.stopMusic(); else if (game.state === GAME_STATES.PLAYING) this.startMusic();
    return this._muted;
  }
};

// ─── Wave Patterns ──────────────────────────────────────────
const WAVE_PATTERNS = [
  { name: 'THE WALL', gen: (diff) => {
    const enemies = [];
    const cols = 7, rows = 4, spacingX = 75, spacingY = 65;
    const startX = (W - (cols-1)*spacingX)/2, startY = 60;
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
      enemies.push(makeEnemy(startX + c*spacingX, startY + r*spacingY,
        r===0?'huge':r===1?'big':'medium', diff));
    return enemies;
  }},
  { name: 'V FORMATION', gen: (diff) => {
    const enemies = [];
    const cx = W/2, spacingX=60, spacingY=55, startY=50;
    for (let row=0; row<5; row++) {
      const count = 1 + row*2;
      const half = Math.floor(count/2);
      for (let c=0; c<count; c++) {
        const x = cx + (c-half)*spacingX;
        const y = startY + row*spacingY;
        const sizeKey = row<1?'huge':row<3?'big':'medium';
        enemies.push(makeEnemy(x, y, sizeKey, diff));
      }
    }
    return enemies;
  }},
  { name: 'DIAMOND', gen: (diff) => {
    const enemies = [];
    const cx = W/2, spacingX=65, spacingY=55, startY=45;
    const rows = [1,3,5,7,5,3,1];
    for (let r=0; r<rows.length; r++) {
      const count = rows[r];
      const half = Math.floor(count/2);
      for (let c=0; c<count; c++) {
        const x = cx + (c-half)*spacingX;
        const y = startY + r*spacingY;
        const sizeKey = r<2?'huge':r<4?'big':'medium';
        enemies.push(makeEnemy(x, y, sizeKey, diff));
      }
    }
    return enemies;
  }},
  { name: 'PINCER', gen: (diff) => {
    const enemies = [];
    const spacingX=65, spacingY=55, startY=55;
    for (let r=0; r<4; r++) for (let c=0; c<3; c++)
      enemies.push(makeEnemy(100 + c*spacingX, startY + r*spacingY,
        r===0?'huge':r===1?'big':'medium', diff));
    for (let r=0; r<4; r++) for (let c=0; c<3; c++)
      enemies.push(makeEnemy(W-100-c*spacingX, startY + r*spacingY,
        r===0?'huge':r===1?'big':'medium', diff));
    return enemies;
  }},
  { name: 'SWARM', gen: (diff) => {
    const enemies = [];
    const cols=9, rows=5, spacingX=60, spacingY=50, startY=40;
    const startX = (W - (cols-1)*spacingX)/2;
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
      enemies.push(makeEnemy(startX + c*spacingX, startY + r*spacingY, 'medium', diff));
    return enemies;
  }},
  { name: 'TANKS', gen: (diff) => {
    const enemies = [];
    const spacingX=130, startY=60;
    const startX = (W - 4*spacingX)/2;
    for (let i=0; i<5; i++)
      enemies.push(makeEnemy(startX + i*spacingX, startY + (i%2)*70, 'huge', diff));
    return enemies;
  }},
  { name: 'ARROWHEAD', gen: (diff) => {
    const enemies = [];
    const cx=W/2, spacingX=55, spacingY=50, startY=40;
    for (let row=0; row<5; row++) {
      const count = 7 - row;
      const half = Math.floor(count/2);
      for (let c=0; c<count; c++) {
        const x = cx + (c-half)*spacingX - row*8;
        const y = startY + row*spacingY;
        const sizeKey = row<=1?'huge':row<=2?'big':'medium';
        enemies.push(makeEnemy(x, y, sizeKey, diff));
      }
    }
    return enemies;
  }},
];

// ─── Boss Wave Generator ────────────────────────────────────
function generateBossWave(waveNum, diff) {
  const enemies = [];
  const bossHP = Math.min(5 + Math.floor(waveNum / 5) * 2, 15);
  const boss = makeEnemy(W/2, 70, 'huge', diff);
  boss.hp = bossHP;
  boss.maxHp = bossHP;
  boss.isBoss = true;
  boss.originalPoints = 100 + Math.floor(waveNum / 5) * 50;
  boss.w = 70;
  boss.h = 64;
  boss.bossDir = 1;
  boss.bossSpeed = 40 + waveNum * 2;
  enemies.push(boss);

  for (let i=0; i<4; i++) {
    const side = i<2 ? -1 : 1;
    const e = makeEnemy(W/2 + side*(50+i*30), 120 + (i%2)*55, 'medium', diff);
    e.hp += 1;
    enemies.push(e);
  }
  return enemies;
}

function makeEnemy(x, y, sizeKey, diff) {
  const sz = BEAR_SIZES[sizeKey];
  const extraHP = diff.bearHPBonus;
  return {
    x, y, w: sz.w, h: sz.h, hp: sz.hp + extraHP, maxHp: sz.hp + extraHP,
    points: sz.points, originalPoints: sz.points, sizeKey,
    colorOffset: sz.colorOffset, alive: true, hitFlash: 0,
    isBoss: false, bossDir: 1, bossSpeed: 0
  };
}

// ─── Game State ─────────────────────────────────────────────
let game = {};

function resetGame() {
  const diff = DIFFICULTIES[currentDifficulty];
  game = {
    state: GAME_STATES.PLAYING,
    score: 0,
    highScore: loadHighScore(),
    wave: 1,
    waveName: '',
    waveAnnounceTimer: 2,
    waveAnnounceText: '',
    lives: diff.lives,
    player: null,
    bullets: [],
    enemyBullets: [],
    enemies: [],
    particles: [],
    powerups: [],
    scorePopups: [],
    snowflakes: [],
    stars: [],
    shootTimer: 0,
    enemyDir: 1,
    enemySpeed: diff.bearBaseSpeed,
    screenShake: 0,
    shakeIntensity: 0,
    difficulty: currentDifficulty,

    // Polish effects
    muzzleFlashes: [],
    explosionRings: [],
    screenFlash: 0,
    dangerFlash: 0,

    // Stats
    totalKills: 0,
    totalShots: 0,
    totalPowerups: 0,
    maxCombo: 0,

    // Power-up state
    powerupTimers: { spread: 0, rapid: 0 },
    hasShield: false,

    // Combo
    combo: 0,
    comboCount: 0,
    comboTimer: 0,
    comboDisplayTimer: 0,
    lastKillTime: 0,

    _menuCooldown: 0,
  };

  for (let i = 0; i < 100; i++) {
    game.stars.push({
      x: Math.random() * W, y: Math.random() * H * 0.7,
      r: Math.random() * 1.5 + 0.5, speed: Math.random() * 0.3 + 0.1,
      brightness: Math.random() * 0.5 + 0.5
    });
  }

  for (let i = 0; i < 30; i++) {
    game.snowflakes.push(createSnowflake());
  }

  game.player = { x: W / 2, y: H - 50, invulnTimer: 0 };
  spawnWave();
}

function createSnowflake() {
  return {
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 3 + 2, speed: Math.random() * 40 + 20,
    drift: Math.random() * 30 - 15, alpha: Math.random() * 0.4 + 0.3
  };
}

function spawnWave() {
  const diff = DIFFICULTIES[currentDifficulty];
  const isBossWave = game.wave > 0 && game.wave % 5 === 0;

  if (isBossWave) {
    const bossNames = ['ICE TITAN', 'FROST KING', 'GLACIAL LORD', 'ARCTIC EMPEROR', 'SNOW DOOM'];
    const idx = Math.floor(game.wave/5) % 5 - 1;
    const bossName = bossNames[idx >= 0 ? idx : 0] || 'FROST COLOSSUS';
    game.waveName = '★ BOSS: ' + bossName;
    game.enemies = generateBossWave(game.wave, diff);
    game.waveAnnounceText = '⚠ BOSS WAVE ⚠';
    game.waveAnnounceTimer = 2.5;
    Audio.bossAppear();
  } else {
    let patternIndex;
    if (game.wave === 1) {
      patternIndex = 0;
    } else {
      const lastIndex = (game.wave - 2) % WAVE_PATTERNS.length;
      do {
        patternIndex = Math.floor(Math.random() * WAVE_PATTERNS.length);
      } while (patternIndex === lastIndex);
    }
    const pattern = WAVE_PATTERNS[patternIndex];
    game.waveName = pattern.name;
    game.enemies = pattern.gen(diff);
    game.waveAnnounceText = 'Wave ' + game.wave + ' — ' + pattern.name;
    game.waveAnnounceTimer = 1.5;
  }
}

// ─── Drawing Functions ──────────────────────────────────────

function drawPenguin(px, py, flash) {
  if (flash && Math.floor(Date.now() / 100) % 2 === 0) return;

  if (game.hasShield) {
    ctx.save();
    ctx.shadowColor = '#44aaff';
    ctx.shadowBlur = 25;
    ctx.strokeStyle = 'rgba(68,170,255,0.3)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px, py, 30, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(px, py + 5, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath();
  ctx.ellipse(px, py + 8, 11, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(px, py - 12, 12, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath();
  ctx.arc(px, py - 13, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(px - 4, py - 15, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + 4, py - 15, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px - 3, py - 16, 0.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + 5, py - 16, 0.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.moveTo(px - 3, py - 10);
  ctx.lineTo(px + 3, py - 10);
  ctx.lineTo(px, py - 6);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.ellipse(px - 8, py + 24, 6, 3, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(px + 8, py + 24, 6, 3, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#555';
  ctx.fillRect(px - 3, py - 30, 6, 10);
  ctx.fillStyle = '#777';
  ctx.fillRect(px - 2, py - 36, 4, 8);
  ctx.fillStyle = '#ffaa00';
  ctx.fillRect(px - 1, py - 38, 2, 3);

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(px - 20, py + 5, 5, 12, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(px + 20, py + 5, 5, 12, 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawPolarBear(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  const hue = 40 - e.colorOffset * 0.5;
  const baseColor = `hsl(${hue}, 15%, ${85 + e.colorOffset * 0.5}%)`;

  if (e.isBoss) {
    ctx.save();
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 30;
  } else if (e.hitFlash > 0) {
    ctx.save();
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 20;
  }

  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.42, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y - h * 0.28, w * 0.24, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x - w * 0.2, y - h * 0.38, w * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.2, y - h * 0.38, w * 0.08, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `hsl(${hue + 10}, 20%, 75%)`;
  ctx.beginPath();
  ctx.arc(x - w * 0.2, y - h * 0.38, w * 0.04, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.2, y - h * 0.38, w * 0.04, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `hsl(${hue}, 10%, 93%)`;
  ctx.beginPath();
  ctx.ellipse(x, y - h * 0.22, w * 0.14, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x, y - h * 0.24, w * 0.04, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = e.isBoss ? '#ff2222' : '#111';
  ctx.beginPath();
  ctx.arc(x - w * 0.1, y - h * 0.32, w * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.1, y - h * 0.32, w * 0.03, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - w * 0.08, y - h * 0.33, w * 0.012, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.12, y - h * 0.33, w * 0.012, 0, Math.PI * 2);
  ctx.fill();

  if (e.isBoss) {
    ctx.fillStyle = '#ffaa00';
    const cx = x, cy = y - h * 0.46;
    ctx.beginPath();
    ctx.moveTo(cx - 14, cy + 5);
    ctx.lineTo(cx - 14, cy - 2);
    ctx.lineTo(cx - 9, cy + 3);
    ctx.lineTo(cx - 3, cy - 5);
    ctx.lineTo(cx + 3, cy - 5);
    ctx.lineTo(cx + 9, cy + 3);
    ctx.lineTo(cx + 14, cy - 2);
    ctx.lineTo(cx + 14, cy + 5);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.ellipse(x - w * 0.18, y + h * 0.36, w * 0.1, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w * 0.18, y + h * 0.36, w * 0.1, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  if (e.isBoss || e.hitFlash > 0) ctx.restore();

  if (e.maxHp > 1) {
    const barW = w * 0.7;
    const barH = e.isBoss ? 6 : 4;
    const barX = x - barW / 2;
    const barY = y + h * 0.44;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = e.isBoss ? '#f44' : (e.hp > 1 ? '#4f4' : '#ff4');
    ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
  }
}

function drawBullet(b) {
  // Fading trail
  ctx.globalAlpha = b.trailAlpha || 0.3;
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(b.x - 1, b.y - 6, 2, b.trailLen || 8);
  ctx.globalAlpha = 1;

  // Bright core
  ctx.shadowColor = '#ff4';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
  ctx.fillStyle = '#fff';
  ctx.fillRect(b.x - 1, b.y - 2, 2, 4);
  ctx.shadowBlur = 0;
}

function drawEnemyBullet(b) {
  ctx.shadowColor = '#4af';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#88ddff';
  ctx.beginPath();
  ctx.ellipse(b.x, b.y, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawParticles() {
  for (const p of game.particles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawMuzzleFlashes() {
  for (let i = game.muzzleFlashes.length - 1; i >= 0; i--) {
    const f = game.muzzleFlashes[i];
    const progress = 1 - f.life / f.maxLife;
    const radius = 3 + 8 * progress;
    const alpha = 1 - progress;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(f.x, f.y, radius * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawExplosionRings() {
  for (const r of game.explosionRings) {
    const progress = 1 - r.life / r.maxLife;
    const radius = r.maxRadius * progress;
    const alpha = 1 - progress;

    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 3 * (1 - progress);
    ctx.shadowColor = r.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPowerUps() {
  for (const pu of game.powerups) {
    const type = POWERUP_TYPES[pu.type];
    const bob = Math.sin(pu.y * 0.1 + Date.now() * 0.003) * 3;
    const px = pu.x, py = pu.y + bob;

    ctx.save();
    ctx.shadowColor = type.color;
    ctx.shadowBlur = 15;

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(px, py, POWERUP_SIZE/2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = type.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, POWERUP_SIZE/2 - 1, 0, Math.PI * 2);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillStyle = type.color;
    ctx.fillText(type.symbol, px, py + 1);

    ctx.restore();
  }
}

function drawScorePopups() {
  for (const sp of game.scorePopups) {
    ctx.globalAlpha = sp.alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (sp.size || 16) + 'px "Courier New", monospace';
    ctx.fillStyle = sp.color;
    // Small shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(sp.text, sp.x + 1, sp.y + 1);
    ctx.fillStyle = sp.color;
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

function drawComboDisplay() {
  if (game.comboDisplayTimer <= 0 || game.combo < 2) return;

  const scale = 1 + Math.sin(Date.now() * 0.01) * 0.1;

  ctx.save();
  ctx.translate(W/2, 90);
  ctx.scale(scale, scale);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 32px "Courier New", monospace';
  ctx.fillStyle = '#ffaa00';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 20;
  ctx.fillText(game.combo + 'x COMBO!', 0, 0);

  ctx.shadowBlur = 0;
  ctx.font = '14px "Courier New", monospace';
  const mult = getComboMultiplier();
  ctx.fillStyle = '#ffcc44';
  ctx.fillText('×' + mult.toFixed(1) + ' points', 0, 28);

  ctx.restore();
}

function drawWaveAnnouncement() {
  if (game.waveAnnounceTimer <= 0) return;

  const total = game.wave % 5 === 0 && game.state === GAME_STATES.PLAYING ? 2.5 : 1.5;
  const t = Math.max(0, game.waveAnnounceTimer / total);
  let alpha = 1;
  let scale = 1;

  if (t > 0.85) {
    const p = (t - 0.85) / 0.15;
    scale = 1 - 0.7 * p;
  } else if (t < 0.25) {
    const p = t / 0.25;
    alpha = p;
    scale = 1 + 0.5 * (1 - p);
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W/2, H/2 - 30);
  ctx.scale(scale, scale);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const isBoss = game.wave % 5 === 0 && game.state === GAME_STATES.PLAYING;
  ctx.shadowColor = isBoss ? '#ff4444' : '#ffaa00';
  ctx.shadowBlur = isBoss ? 35 : 20;
  ctx.font = isBoss ? 'bold 36px "Courier New", monospace' : 'bold 28px "Courier New", monospace';
  ctx.fillStyle = isBoss ? '#ff4444' : '#ffaa00';
  ctx.fillText(game.waveAnnounceText, 0, 0);

  ctx.shadowBlur = 0;
  if (!isBoss) {
    ctx.font = '16px "Courier New", monospace';
    ctx.fillStyle = '#aabbcc';
    ctx.fillText('◈ ' + game.waveName + ' ◈', 0, 36);
  }

  ctx.restore();
}

function drawSnowflakes() {
  for (const s of game.snowflakes) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawStars() {
  for (const s of game.stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawDangerBorder() {
  // Find the lowest alive enemy
  let lowestY = 0;
  for (const e of game.enemies) {
    if (e.alive && e.y + e.h/2 > lowestY) lowestY = e.y + e.h/2;
  }

  if (lowestY < H * 0.55) return; // Safe

  const dangerLevel = Math.min(1, (lowestY - H * 0.55) / (H * 0.25));
  const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
  const alpha = dangerLevel * pulse * 0.4;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Red border overlay
  const grad = ctx.createRadialGradient(W/2, H/2, 200, W/2, H/2, 400);
  grad.addColorStop(0, 'rgba(255,0,0,0)');
  grad.addColorStop(0.7, 'rgba(255,0,0,0)');
  grad.addColorStop(1, 'rgba(255,0,0,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

function drawScreenFlash() {
  if (game.screenFlash <= 0) return;
  const alpha = game.screenFlash * 0.4;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawHUD() {
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.font = '20px "Courier New", monospace';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;

  ctx.fillStyle = '#fff';
  ctx.fillText('Score: ' + game.score.toLocaleString(), 20, 20);
  ctx.textAlign = 'right';
  ctx.fillText('Wave ' + game.wave, W - 20, 20);

  ctx.textAlign = 'center';
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#ffaa00';
  ctx.fillText('HI: ' + game.highScore.toLocaleString(), W/2, 20);

  if (game.waveName && game.waveAnnounceTimer <= 0) {
    ctx.textAlign = 'right';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = '#ffaa00';
    ctx.fillText('◈ ' + game.waveName + ' ◈', W - 20, 44);
  }

  ctx.textAlign = 'center';
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#667';
  ctx.fillText(DIFFICULTIES[currentDifficulty].label.toUpperCase(), W / 2, 34);

  ctx.textAlign = 'left';
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#ff4444';
  for (let i = 0; i < game.lives; i++) {
    ctx.fillText('♥', 20 + i * 26, H - 30);
  }

  if (game.powerupTimers.spread > 0 || game.powerupTimers.rapid > 0) {
    let puStr = '';
    if (game.powerupTimers.spread > 0) puStr += '⍟SPREAD ' + game.powerupTimers.spread.toFixed(1) + 's ';
    if (game.powerupTimers.rapid > 0) puStr += '⚡RAPID ' + game.powerupTimers.rapid.toFixed(1) + 's';
    ctx.textAlign = 'left';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = '#ff44ff';
    ctx.fillText(puStr, 20, 50);
  }

  if (game.hasShield) {
    ctx.textAlign = 'left';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = '#44aaff';
    ctx.fillText('◈ SHIELD', 20, game.powerupTimers.spread > 0 || game.powerupTimers.rapid > 0 ? 64 : 50);
  }

  ctx.textAlign = 'right';
  ctx.font = '14px sans-serif';
  ctx.fillStyle = Audio._muted ? '#ff4444' : '#44ff44';
  ctx.fillText(Audio._muted ? '🔇' : '🔊', W - 20, H - 30);

  ctx.shadowBlur = 0;
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 30;
  ctx.font = 'bold 48px "Courier New", monospace';
  ctx.fillStyle = '#ffaa00';
  ctx.fillText('🐧 PENGUIN INVADERS', W / 2, H * 0.2);
  ctx.shadowBlur = 0;

  ctx.font = '18px "Courier New", monospace';
  ctx.fillStyle = '#8899aa';
  ctx.fillText('A penguin with a gun vs polar bears in space!', W / 2, H * 0.28);

  ctx.font = '14px "Courier New", monospace';
  ctx.fillStyle = '#667';
  ctx.fillText('Select difficulty and press SPACE to start', W / 2, H * 0.36);

  const hs = loadHighScore();
  if (hs > 0) {
    ctx.font = '16px "Courier New", monospace';
    ctx.fillStyle = '#ffaa00';
    ctx.fillText('🏆 High Score: ' + hs.toLocaleString(), W / 2, H * 0.32);
  }

  const difficulties = ['easy', 'medium', 'hard'];
  const colors = { easy: '#4f4', medium: '#ff4', hard: '#f44' };
  const labels = { easy: 'EASY', medium: 'MEDIUM', hard: 'HARD' };
  const descs = {
    easy: '5 lives · Slow · Light fire',
    medium: '3 lives · Regular pace',
    hard: '2 lives · Fast · Heavy fire'
  };

  const boxW = 210, boxH = 72, gap = 20;
  const totalW = 3 * boxW + 2 * gap;
  const startX = (W - totalW) / 2;
  const boxY = H * 0.44;

  ctx.strokeStyle = '#334';

  for (let i = 0; i < 3; i++) {
    const d = difficulties[i];
    const bx = startX + i * (boxW + gap);
    const isActive = d === currentDifficulty;

    ctx.fillStyle = isActive ? 'rgba(255,170,0,0.15)' : 'rgba(20,20,50,0.8)';
    ctx.fillRect(bx, boxY, boxW, boxH);
    ctx.strokeRect(bx, boxY, boxW, boxH);

    if (isActive) {
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, boxY, boxW, boxH);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#334';
    }

    ctx.fillStyle = isActive ? '#ffaa00' : colors[d];
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[d], bx + boxW / 2, boxY + 22);

    ctx.fillStyle = isActive ? '#aab' : '#667';
    ctx.font = '11px "Courier New", monospace';
    ctx.fillText(descs[d], bx + boxW / 2, boxY + 52);

    if (isActive) {
      ctx.fillStyle = '#ffaa00';
      ctx.font = '16px sans-serif';
      ctx.fillText('◀', bx - 10, boxY + boxH / 2);
      ctx.fillText('▶', bx + boxW + 10, boxY + boxH / 2);
    }
  }

  ctx.fillStyle = '#556';
  ctx.font = '12px "Courier New", monospace';
  ctx.textBaseline = 'bottom';
  ctx.fillText('← →  or  A/D  to select difficulty   ·   SPACE to play', W / 2, H - 60);
  ctx.textBaseline = 'middle';
  ctx.fillText('Fullscreen: 1   ·   P to pause   ·   M for sound', W / 2, H - 40);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#44aaff';
  ctx.shadowBlur = 30;
  ctx.font = 'bold 52px "Courier New", monospace';
  ctx.fillStyle = '#44aaff';
  ctx.fillText('PAUSED', W / 2, H * 0.4);
  ctx.shadowBlur = 0;

  ctx.font = '16px "Courier New", monospace';
  ctx.fillStyle = '#8899aa';
  ctx.fillText('Press P to resume', W / 2, H * 0.52);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 30;
  ctx.font = 'bold 52px "Courier New", monospace';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', W / 2, H * 0.24);
  ctx.shadowBlur = 0;

  const hs = loadHighScore();
  if (game.score >= hs && game.score > 0) {
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillStyle = '#ffaa00';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 15;
    ctx.fillText('🏆 NEW HIGH SCORE! 🏆', W / 2, H * 0.32);
    ctx.shadowBlur = 0;
  }

  ctx.font = '28px "Courier New", monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('Final Score: ' + game.score.toLocaleString(), W / 2, H * 0.39);

  if (game.score < hs) {
    ctx.font = '13px "Courier New", monospace';
    ctx.fillStyle = '#ffaa00';
    ctx.fillText('High Score: ' + hs.toLocaleString(), W / 2, H * 0.455);
  }

  // Stats panel
  const statsY = H * 0.50;
  ctx.font = '14px "Courier New", monospace';
  ctx.fillStyle = '#aabbcc';
  ctx.fillText('—  Stats  —', W / 2, statsY);

  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#8899aa';
  const lines = [
    'Wave: ' + game.wave,
    'Kills: ' + game.totalKills,
    'Shots: ' + game.totalShots,
    'Best Combo: ' + game.maxCombo + 'x',
    'Power-ups: ' + game.totalPowerups,
    'Difficulty: ' + DIFFICULTIES[currentDifficulty].label,
  ];
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, statsY + 20 + i * 18);
  });

  ctx.font = '18px "Courier New", monospace';
  ctx.fillStyle = '#8899aa';
  ctx.fillText('Press SPACE to Restart', W / 2, H * 0.82);
  ctx.fillText('Press ESC for Menu', W / 2, H * 0.88);
}

// ─── Update Functions ───────────────────────────────────────

function spawnParticles(x, y, count, color, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 120 + 40;
    game.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: life || 0.6, alpha: 1,
      size: Math.random() * 3 + 1.5, color: color || '#ffdd44'
    });
  }
}

function spawnExplosionRing(x, y, color, maxRadius) {
  game.explosionRings.push({
    x, y, life: 0.5, maxLife: 0.5, maxRadius: maxRadius || 60, color: color || '#ffdd44'
  });
}

function spawnBossExplosion(e) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 200 + 80;
    const colors = ['#ff4444', '#ffaa00', '#ffdd44', '#fff', '#ff8800'];
    game.particles.push({
      x: e.x, y: e.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: Math.random() * 0.8 + 0.4, alpha: 1,
      size: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
  spawnExplosionRing(e.x, e.y, '#ff4444', 120);
  spawnExplosionRing(e.x, e.y, '#ffaa00', 100);
  game.screenShake = 0.5;
  game.shakeIntensity = 15;
}

function getComboMultiplier() {
  if (game.combo >= 10) return 4;
  if (game.combo >= 6) return 3;
  if (game.combo >= 3) return 2;
  if (game.combo >= 2) return 1.5;
  return 1;
}

function addScorePopup(x, y, points, color, size) {
  game.scorePopups.push({
    x, y, vy: -60, text: '+' + points,
    alpha: 1, life: 0.8, color: color || '#fff',
    size: size || 16
  });
}

function spawnPowerUp(x, y) {
  const diff = DIFFICULTIES[currentDifficulty];
  if (Math.random() > diff.powerUpChance) return;
  const type = POWERUP_KEYS[Math.floor(Math.random() * POWERUP_KEYS.length)];
  game.powerups.push({ x, y, type, vy: POWERUP_FALL_SPEED });
}

function updateParticles(dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    p.alpha = Math.max(0, p.life / 0.6);
    p.size *= (1 - dt * 0.5);
    if (p.life <= 0 || p.alpha <= 0) game.particles.splice(i, 1);
  }
}

function updateMuzzleFlashes(dt) {
  for (let i = game.muzzleFlashes.length - 1; i >= 0; i--) {
    game.muzzleFlashes[i].life -= dt;
    if (game.muzzleFlashes[i].life <= 0) game.muzzleFlashes.splice(i, 1);
  }
}

function updateExplosionRings(dt) {
  for (let i = game.explosionRings.length - 1; i >= 0; i--) {
    game.explosionRings[i].life -= dt;
    if (game.explosionRings[i].life <= 0) game.explosionRings.splice(i, 1);
  }
}

function updatePowerUps(dt) {
  const p = game.player;
  for (let i = game.powerups.length - 1; i >= 0; i--) {
    const pu = game.powerups[i];
    // Power-ups always fall at full speed; the magnet only adds a
    // horizontal drift toward the player when close, so they never
    // stall hovering above the player.
    pu.y += pu.vy * dt;
    const dx = p.x - pu.x;
    const dy = p.y - pu.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 100 && dist > 1) {
      // Normalized horizontal pull, capped so it stays a gentle drift.
      const pull = (dx / dist) * 90 * dt;
      pu.x += Math.abs(pull) > Math.abs(dx) ? dx : pull;
    }
    if (pu.y > H + 20) game.powerups.splice(i, 1);
  }

  if (game.powerupTimers.spread > 0) game.powerupTimers.spread = Math.max(0, game.powerupTimers.spread - dt);
  if (game.powerupTimers.rapid > 0) game.powerupTimers.rapid = Math.max(0, game.powerupTimers.rapid - dt);
}

function updateScorePopups(dt) {
  for (let i = game.scorePopups.length - 1; i >= 0; i--) {
    const sp = game.scorePopups[i];
    sp.y += sp.vy * dt;
    sp.life -= dt;
    sp.alpha = Math.max(0, sp.life / 0.8);
    if (sp.life <= 0) game.scorePopups.splice(i, 1);
  }
}

function updateCombo(dt) {
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0) { game.combo = 0; game.comboCount = 0; }
  }
  if (game.comboDisplayTimer > 0) game.comboDisplayTimer -= dt;
}

function updateSnowflakes(dt) {
  for (const s of game.snowflakes) {
    s.y += s.speed * dt;
    s.x += Math.sin(s.y * 0.01) * s.drift * dt;
    if (s.y > H) { s.y = -5; s.x = Math.random() * W; }
    if (s.x < -5) s.x = W + 5;
    if (s.x > W + 5) s.x = -5;
  }
}

function updateStars(dt) {
  for (const s of game.stars) {
    s.brightness += (Math.random() - 0.5) * dt * 2;
    s.brightness = Math.max(0.3, Math.min(1, s.brightness));
  }
}

function checkBulletCollisions() {
  for (let bi = game.bullets.length - 1; bi >= 0; bi--) {
    const b = game.bullets[bi];
    for (let ei = game.enemies.length - 1; ei >= 0; ei--) {
      const e = game.enemies[ei];
      if (!e.alive) continue;
      if (b.x > e.x - e.w / 2 && b.x < e.x + e.w / 2 &&
          b.y > e.y - e.h / 2 && b.y < e.y + e.h / 2) {
        game.bullets.splice(bi, 1);
        e.hp--;
        e.hitFlash = 0.1;

        if (e.hp > 0) {
          Audio.enemyHit();
          const sizes = ['huge', 'big', 'medium'];
          const idx = sizes.indexOf(e.sizeKey);
          if (idx < sizes.length - 1) {
            e.sizeKey = sizes[idx + 1];
            const newSz = BEAR_SIZES[e.sizeKey];
            e.w = newSz.w; e.h = newSz.h;
          }
          spawnParticles(e.x, e.y, 6, '#ffdd44', 0.6);
          spawnExplosionRing(e.x, e.y, '#ffdd44', 35);
        } else {
          e.alive = false;
          game.totalKills++;

          const now = performance.now() / 1000;
          if (now - game.lastKillTime < 1.5 && game.lastKillTime > 0) {
            game.combo++;
            game.comboCount++;
            game.comboDisplayTimer = 1.5;
            Audio.combo(Math.min(game.combo, 10));
          } else {
            game.combo = 1;
            game.comboCount = 1;
            game.comboDisplayTimer = 1.0;
          }
          game.lastKillTime = now;
          game.comboTimer = 1.5;
          if (game.combo > game.maxCombo) game.maxCombo = game.combo;

          const mult = getComboMultiplier();
          const points = Math.round(e.originalPoints * mult);
          game.score += points;

          Audio.enemyKill();
          const popColor = mult > 1 ? '#ffaa00' : '#ffdd44';
          const popSize = mult > 1 ? 20 : 16;
          addScorePopup(e.x, e.y - 20, points, popColor, popSize);

          if (e.isBoss) {
            spawnBossExplosion(e);
            Audio.nuke();
          } else {
            spawnParticles(e.x, e.y, 12, '#ffdd44', 1.2);
            spawnExplosionRing(e.x, e.y, '#ffdd44', 50);
          }

          spawnPowerUp(e.x, e.y);
        }
        break;
      }
    }
  }
}

function checkPowerUpCollisions() {
  const p = game.player;
  for (let i = game.powerups.length - 1; i >= 0; i--) {
    const pu = game.powerups[i];
    const dx = pu.x - p.x;
    const dy = pu.y - p.y;
    if (dx * dx + dy * dy < 900) { // dist < 30
      const type = POWERUP_TYPES[pu.type];
      if (type.instant) {
        switch (pu.type) {
          case 'shield': game.hasShield = true; break;
          case 'life': game.lives++; break;
          case 'nuke':
            Audio.nuke();
            game.screenShake = 0.4;
            game.shakeIntensity = 12;
            for (const e of game.enemies) {
              if (e.alive) {
                e.alive = false;
                game.totalKills++;
                game.score += e.originalPoints;
                spawnParticles(e.x, e.y, 10, '#ffaa00', 0.8);
                spawnExplosionRing(e.x, e.y, '#ffaa00', 40);
              }
            }
            break;
        }
      } else {
        game.powerupTimers[pu.type] = (type.duration || 5);
      }
      Audio.powerUp();
      game.powerups.splice(i, 1);
      game.totalPowerups++;
      addScorePopup(pu.x, pu.y - 10, type.label, type.color);
    }
  }
}

function checkEnemyBulletCollisions() {
  const p = game.player;
  if (p.invulnTimer > 0) return;

  for (let bi = game.enemyBullets.length - 1; bi >= 0; bi--) {
    const b = game.enemyBullets[bi];
    if (b.x > p.x - 15 && b.x < p.x + 15 &&
        b.y > p.y - 25 && b.y < p.y + 25) {
      game.enemyBullets.splice(bi, 1);

      if (game.hasShield) {
        game.hasShield = false;
        spawnParticles(p.x, p.y, 15, '#44aaff', 0.8);
        Audio.powerUp();
        return;
      }

      game.lives--;
      Audio.playerHit();
      p.invulnTimer = INVULN_TIME;
      game.screenShake = 0.3;
      game.shakeIntensity = 8;

      if (game.lives <= 0) {
        game.state = GAME_STATES.GAME_OVER;
        Audio.stopMusic();
        Audio.gameOver();
        if (game.score > loadHighScore()) {
          saveHighScore(game.score);
          game.highScore = game.score;
        }
      }
      return;
    }
  }
}

function updatePlayer(dt) {
  const diff = DIFFICULTIES[currentDifficulty];
  const p = game.player;

  if (p.invulnTimer > 0) p.invulnTimer -= dt;

  if (keys.left) p.x -= diff.playerSpeed * dt;
  if (keys.right) p.x += diff.playerSpeed * dt;
  p.x = Math.max(20, Math.min(W - 20, p.x));

  game.shootTimer -= dt;
  if (keys.space && game.shootTimer <= 0) {
    const cd = game.powerupTimers.rapid > 0 ? diff.shootCooldown * 0.45 : diff.shootCooldown;

    game.totalShots++;

    if (game.powerupTimers.spread > 0) {
      game.bullets.push({ x: p.x, y: p.y - 38, vx: 0, trailLen: 10, trailAlpha: 0.4 });
      game.bullets.push({ x: p.x - 10, y: p.y - 35, vx: -60, trailLen: 8, trailAlpha: 0.3 });
      game.bullets.push({ x: p.x + 10, y: p.y - 35, vx: 60, trailLen: 8, trailAlpha: 0.3 });
    } else {
      game.bullets.push({ x: p.x, y: p.y - 38, vx: 0, trailLen: 10, trailAlpha: 0.4 });
    }

    // Muzzle flash
    game.muzzleFlashes.push({ x: p.x, y: p.y - 40, life: 0.08, maxLife: 0.08 });

    Audio.shoot();
    game.shootTimer = cd;
  }
}

function updateBullets(dt) {
  for (const b of game.bullets) {
    b.y -= BULLET_SPEED * dt;
    if (b.vx) b.x += b.vx * dt;
  }
  for (const b of game.enemyBullets) {
    b.y += ENEMY_BULLET_SPEED * dt;
  }
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    if (game.bullets[i].y < -20) game.bullets.splice(i, 1);
  }
  for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
    if (game.enemyBullets[i].y > H + 20) game.enemyBullets.splice(i, 1);
  }
}

function updateEnemies(dt) {
  const diff = DIFFICULTIES[currentDifficulty];
  const aliveEnemies = game.enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0) {
    game.screenFlash = 0.15;
    Audio.waveComplete();
    game.wave++;
    game.enemyBullets = [];
    game.enemySpeed = diff.bearBaseSpeed + game.wave * diff.waveSpeedBonus;
    spawnWave();
    return;
  }

  let hitEdge = false;

  const bosses = aliveEnemies.filter(e => e.isBoss);
  const minions = aliveEnemies.filter(e => !e.isBoss);

  for (const e of bosses) {
    e.x += e.bossSpeed * e.bossDir * dt;
    if (e.x - e.w / 2 < 30 || e.x + e.w / 2 > W - 30) e.bossDir *= -1;
    if (e.y < 100) e.y += 10 * dt;
  }

  for (const e of minions) {
    e.x += game.enemySpeed * game.enemyDir * dt;
    if (e.x - e.w / 2 < 10 || e.x + e.w / 2 > W - 10) hitEdge = true;
  }

  if (hitEdge) {
    game.enemyDir *= -1;
    game.enemySpeed += 1;
    for (const e of minions) {
      e.y += DROP_DISTANCE;
      if (e.y + e.h / 2 >= game.player.y - 20) {
        game.state = GAME_STATES.GAME_OVER;
        Audio.stopMusic();
        Audio.gameOver();
        if (game.score > loadHighScore()) saveHighScore(game.score);
        return;
      }
    }
  }

  for (const e of aliveEnemies) {
    if (e.hitFlash > 0) e.hitFlash -= dt;
  }

  const bottomRow = {};
  for (const e of minions) {
    const colKey = Math.round(e.x / 75);
    if (!bottomRow[colKey] || e.y > bottomRow[colKey].y) bottomRow[colKey] = e;
  }

  const fireRate = diff.enemyFireRate * (1 + game.wave * 0.05);
  for (const colKey in bottomRow) {
    if (Math.random() < fireRate) {
      game.enemyBullets.push({ x: bottomRow[colKey].x, y: bottomRow[colKey].y + bottomRow[colKey].h / 2, w: 6, h: 10 });
    }
  }

  for (const e of bosses) {
    if (Math.random() < fireRate * 3) {
      game.enemyBullets.push({ x: e.x, y: e.y + e.h / 2 + 10, w: 8, h: 14 });
    }
  }
}

// ─── Render ──────────────────────────────────────────────────

function render() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#080820';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const ox = (canvas.width - W * renderScale) / 2;
  const oy = (canvas.height - H * renderScale) / 2;
  ctx.setTransform(renderScale, 0, 0, renderScale, ox, oy);

  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0a2e');
  bgGrad.addColorStop(0.5, '#0f0f3a');
  bgGrad.addColorStop(1, '#080820');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Screen shake
  if (game.screenShake > 0) {
    const intensity = game.shakeIntensity * (game.screenShake / 0.3);
    ctx.save();
    ctx.translate((Math.random()-0.5)*intensity, (Math.random()-0.5)*intensity);
  }

  // Menu
  if (game.state === GAME_STATES.MENU) {
    drawStars();
    drawSnowflakes();
    drawMenu();
    if (game.screenShake > 0) ctx.restore();
    return;
  }

  // Screen flash on wave clear
  drawScreenFlash();

  drawStars();
  drawSnowflakes();
  drawParticles();
  drawMuzzleFlashes();
  drawExplosionRings();
  drawPowerUps();
  drawScorePopups();

  for (const e of game.enemies) {
    if (e.alive) drawPolarBear(e);
  }

  if (game.state === GAME_STATES.PLAYING || game.state === GAME_STATES.PAUSED) {
    drawPenguin(game.player.x, game.player.y, game.player.invulnTimer > 0);
  }

  for (const b of game.bullets) drawBullet(b);
  for (const b of game.enemyBullets) drawEnemyBullet(b);

  // Danger border when enemies get too low
  if (game.state === GAME_STATES.PLAYING) drawDangerBorder();

  drawHUD();
  drawComboDisplay();
  drawWaveAnnouncement();

  // Pause
  if (game.state === GAME_STATES.PAUSED) {
    if (game.screenShake > 0) ctx.restore();
    drawPauseOverlay();
    return;
  }

  if (game.state === GAME_STATES.GAME_OVER) {
    if (game.screenShake > 0) ctx.restore();
    drawGameOver();
    return;
  }

  if (game.screenShake > 0) ctx.restore();
}

// ─── Update ──────────────────────────────────────────────────

function update(dt) {
  const cappedDt = Math.min(dt, 0.05);

  if (game.state === GAME_STATES.MENU) {
    const diffs = ['easy', 'medium', 'hard'];
    if (keys.left && !game._menuCooldown) {
      game._menuCooldown = 0.2;
      const idx = diffs.indexOf(currentDifficulty);
      if (idx > 0) currentDifficulty = diffs[idx - 1];
      updateDiffButtons();
    }
    if (keys.right && !game._menuCooldown) {
      game._menuCooldown = 0.2;
      const idx = diffs.indexOf(currentDifficulty);
      if (idx < diffs.length - 1) currentDifficulty = diffs[idx + 1];
      updateDiffButtons();
    }
    if (game._menuCooldown) {
      game._menuCooldown -= cappedDt;
      if (game._menuCooldown < 0) game._menuCooldown = 0;
    }
    if (spaceJustPressed) { resetGame(); game.state = GAME_STATES.PLAYING; }
    updateSnowflakes(cappedDt);
    updateStars(cappedDt);
    return;
  }

  if (game.state === GAME_STATES.GAME_OVER) {
    if (spaceJustPressed) resetGame();
    updateSnowflakes(cappedDt);
    updateParticles(cappedDt);
    updateExplosionRings(cappedDt);
    return;
  }

  if (game.state === GAME_STATES.PAUSED) {
    updateSnowflakes(cappedDt);
    updateStars(cappedDt);
    return;
  }

  updatePlayer(cappedDt);
  updateBullets(cappedDt);
  updateEnemies(cappedDt);
  checkBulletCollisions();
  checkEnemyBulletCollisions();
  checkPowerUpCollisions();
  updateParticles(cappedDt);
  updateMuzzleFlashes(cappedDt);
  updateExplosionRings(cappedDt);
  updatePowerUps(cappedDt);
  updateScorePopups(cappedDt);
  updateCombo(cappedDt);
  updateSnowflakes(cappedDt);
  updateStars(cappedDt);

  if (game.waveAnnounceTimer > 0) {
    game.waveAnnounceTimer -= cappedDt;
    if (game.waveAnnounceTimer < 0) game.waveAnnounceTimer = 0;
  }

  if (game.screenFlash > 0) {
    game.screenFlash -= cappedDt * 2;
    if (game.screenFlash < 0) game.screenFlash = 0;
  }

  if (game.screenShake > 0) {
    game.screenShake -= cappedDt;
    if (game.screenShake < 0) game.screenShake = 0;
  }

  // Clear edge-triggered flags at end of frame
  spaceJustPressed = false;
}

// ─── Game Loop ──────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ─── UI Controls ────────────────────────────────────────────

function updateDiffButtons() {
  ['easy', 'medium', 'hard'].forEach(d => {
    const btn = document.getElementById('diff' + d.charAt(0).toUpperCase() + d.slice(1));
    if (btn) btn.classList.toggle('active', d === currentDifficulty);
  });
}

function toggleFullscreen() {
  const container = document.querySelector('.game-container');
  if (!document.fullscreenElement) {
    container.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

document.getElementById('diffEasy').addEventListener('click', () => { currentDifficulty = 'easy'; updateDiffButtons(); });
document.getElementById('diffMedium').addEventListener('click', () => { currentDifficulty = 'medium'; updateDiffButtons(); });
document.getElementById('diffHard').addEventListener('click', () => { currentDifficulty = 'hard'; updateDiffButtons(); });
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
document.getElementById('muteBtn').addEventListener('click', () => {
  const muted = Audio.toggleMute();
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'm' || e.key === 'M') {
    const muted = Audio.toggleMute();
    document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
    e.preventDefault();
  }
  if ((e.key === 'p' || e.key === 'P') && (game.state === GAME_STATES.PLAYING || game.state === GAME_STATES.PAUSED)) {
    game.state = game.state === GAME_STATES.PLAYING ? GAME_STATES.PAUSED : GAME_STATES.PLAYING;
    if (game.state === GAME_STATES.PAUSED) Audio.stopMusic(); else Audio.startMusic();
    e.preventDefault();
  }
  if (e.key === '1') { toggleFullscreen(); e.preventDefault(); }
  if (e.key === 'Escape' && game.state === GAME_STATES.GAME_OVER) {
    game.state = GAME_STATES.MENU;
    Audio.stopMusic();
  }
});

resetGame();
game.state = GAME_STATES.MENU;
requestAnimationFrame(gameLoop);

function resizeCanvas() {
  if (document.fullscreenElement) {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    canvas.width = vw;
    canvas.height = vh;
    renderScale = Math.min(vw / W, vh / H);
    canvas.style.width = '';
    canvas.style.height = '';
  } else {
    canvas.width = W;
    canvas.height = H;
    renderScale = 1;
    canvas.style.width = '';
    canvas.style.height = '';
  }
}
document.addEventListener('fullscreenchange', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

canvas.focus();
canvas.addEventListener('click', () => canvas.focus());

</script>
